  .feedback-wrong { background: #fde0dc; border-color: var(--rose); color: #7a1c2a; }

  .pop { animation: pop 0.2s ease-out; }

const ACCENTS = ["á", "é", "í", "ó", "ú", "ñ", "Á", "É", "Í", "Ó", "Ú", "Ñ", "¿", "¡"];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function exactMatch(input, correct) {
  return input.trim().toLowerCase().replace(/[.,!?¡¿]+$/g, "") ===
         correct.trim().toLowerCase().replace(/[.,!?¡¿]+$/g, "");
}

function findDifferences(input, correct) {
  const ci = input.toLowerCase().replace(/[.,!?¡¿]+$/g, "").trim();
  const cc = correct.toLowerCase().replace(/[.,!?¡¿]+$/g, "").trim();
  if (ci === cc) return [];
  const issues = [];
  const stripAccents = s => s.normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/ñ/g, "n");
  if (stripAccents(ci) === stripAccents(cc)) {
    issues.push("Missing or wrong accents/ñ");
  } else {
    if (ci.replace(/h/g, "") === cc.replace(/h/g, "")) issues.push("Silent 'h' issue");
    if (ci.replace(/[bv]/g, "x") === cc.replace(/[bv]/g, "x")) issues.push("b/v confusion");
    if (ci.replace(/[csz]/g, "x") === cc.replace(/[csz]/g, "x")) issues.push("c/s/z confusion");
    if (ci.replace(/ll/g, "y") === cc.replace(/ll/g, "y")) issues.push("ll/y confusion");
  }
  return issues;
}

function wordCount(text) {
  return text.trim().split(/\s+/).filter(w => w.length > 0).length;
}

// Spanish text-to-speech
function useSpanishSpeech() {
  const [voice, setVoice] = useState(null);
  const [available, setAvailable] = useState(false);

  useEffect(() => {
    if (!('speechSynthesis' in window)) return;
    const pickVoice = () => {
      const voices = window.speechSynthesis.getVoices();
      // Prefer Spanish (Spain) voices
      const spanishVoice = voices.find(v => v.lang.startsWith('es-ES')) ||
                           voices.find(v => v.lang.startsWith('es-MX')) ||
                           voices.find(v => v.lang.startsWith('es-'));
      if (spanishVoice) {
        setVoice(spanishVoice);
        setAvailable(true);
      }
    };
    pickVoice();
    window.speechSynthesis.onvoiceschanged = pickVoice;
  }, []);

  const speak = useCallback((text, rate = 0.85) => {
    if (!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    if (voice) utter.voice = voice;
    utter.lang = "es-ES";
    utter.rate = rate;
    utter.pitch = 1.0;
    window.speechSynthesis.speak(utter);
  }, [voice]);

  return { speak, available };
}

function Practice({ mode, topics, onDone, onUpdateStats }) {
  const SESSION = 10;
  const [queue, setQueue] = useState([]);
  const [idx, setIdx] = useState(0);
  const [answer, setAnswer] = useState("");
  const [feedback, setFeedback] = useState(null);
  const [diffs, setDiffs] = useState([]);
  const [score, setScore] = useState(0);
  const [showHint, setShowHint] = useState(false);
  const inputRef = useRef(null);

  useEffect(() => {
    let items = [];
    if (mode === "vocab") {
      topics.forEach(t => {
        VOCAB[t].forEach(([es, en]) => items.push({ es, en, topic: TOPICS[t].short }));
      });
      items = shuffle(items).slice(0, SESSION);
    }
    if (mode === "accents") items = shuffle(ACCENT_ITEMS).slice(0, SESSION);
    if (mode === "spelling") items = shuffle(SPELLING_TRAPS).slice(0, SESSION);
    if (mode === "agreement") items = shuffle(AGREEMENT_ITEMS).slice(0, SESSION);
    if (mode === "pretimpf") items = shuffle(PRET_VS_IMPF).slice(0, SESSION);
    if (mode === "future") items = shuffle(FUTURE_COND).slice(0, SESSION);
    if (mode === "subj") items = shuffle(SUBJUNCTIVE).slice(0, SESSION);
    setQueue(items);
  }, [mode, topics]);

  useEffect(() => { if (inputRef.current) inputRef.current.focus(); }, [idx, queue]);

  if (queue.length === 0) return <div className="card p-6">Loading...</div>;

  if (idx >= queue.length) {
    const pct = Math.round(100 * score / queue.length);
    const msg = pct >= 90 ? "¡Excelente! 🌟" : pct >= 70 ? "¡Muy bien! 👏" : pct >= 50 ? "Vamos mejorando" : "Sigue practicando";
    return (
      <div className="card p-6 text-center pop">
        <div className="text-4xl mb-2">🎯</div>
        <h2 className="font-display text-2xl mb-2">{msg}</h2>
        <p className="text-lg mb-2">{score}/{queue.length}</p>
        <div className="progress-bar mb-4 max-w-xs mx-auto"><div className="progress-fill" style={{width:`${pct}%`}}></div></div>
        <div className="flex gap-3 justify-center">
          <button onClick={() => window.location.reload()} className="btn-primary px-5 py-2">Again</button>
          <button onClick={onDone} className="btn-secondary px-5 py-2">Home</button>
        </div>
      </div>
    );
  }

  const cur = queue[idx];
  let prompt, correct, subtitle, hint, note;

  if (mode === "vocab") {
    prompt = cur.en; correct = cur.es; subtitle = cur.topic; hint = `${cur.es.length} letters · "${cur.es[0]}..."`;
  } else if (mode === "accents") {
    prompt = cur.en; correct = cur.correct; subtitle = "Type with correct accents"; hint = `${cur.correct.length} letters`;
  } else if (mode === "spelling") {
    prompt = cur.hint; correct = cur.correct; subtitle = "Watch b/v, h, c/s/z, ll/y"; hint = `Starts with "${cur.correct[0]}"`;
  } else if (mode === "agreement") {
    prompt = cur.prompt; correct = cur.correct; subtitle = "Gender & agreement"; note = cur.note;
    hint = `Starts with "${cur.correct.split(" ")[0]}"`;
  } else if (mode === "pretimpf") {
    prompt = cur.en; correct = cur.es; subtitle = "Preterite vs Imperfect"; note = cur.tense;
    hint = `Starts with "${cur.es.split(" ")[0]}"`;
  } else if (mode === "future") {
    prompt = cur.en; correct = cur.es; subtitle = "Future / Conditional / Perfect"; note = cur.tense;
    hint = `Starts with "${cur.es.split(" ")[0]}"`;
  } else if (mode === "subj") {
    prompt = cur.en; correct = cur.es; subtitle = "Subjunctive"; note = cur.trigger;
    hint = `Starts with "${cur.es.split(" ")[0]}"`;
  }

  const submit = () => {
    if (feedback) return;
    if (!answer.trim()) return;
    const right = exactMatch(answer, correct);
    setFeedback(right ? "right" : "wrong");
    if (!right) setDiffs(findDifferences(answer, correct));
    if (right) setScore(s => s + 1);
    onUpdateStats(right, mode);
  };

  const next = () => { setAnswer(""); setFeedback(null); setDiffs([]); setShowHint(false); setIdx(i => i + 1); };
  const insertChar = (c) => { if (feedback) return; setAnswer(a => a + c); if (inputRef.current) inputRef.current.focus(); };
  const handleKey = (e) => { if (e.key === "Enter") feedback ? next() : submit(); };

  return (
    <div className="pop">
      <div className="flex items-center gap-3 mb-4">
        <button onClick={onDone} className="btn-secondary px-3 py-1 text-sm">← Home</button>
        <div className="progress-bar flex-1"><div className="progress-fill" style={{width:`${(idx/queue.length)*100}%`}}></div></div>
        <span className="text-sm font-semibold">{idx+1}/{queue.length}</span>
      </div>

      <div className="card p-5 mb-4">
        <div className="text-xs uppercase tracking-wide mb-2" style={{color:"var(--terracotta)"}}>{subtitle}</div>
        <div className="font-display text-xl md:text-2xl mb-2">{prompt}</div>
        {note && <div className="grammar-note mt-3 text-sm">💡 {note}</div>}
      </div>

      <input ref={inputRef} type="text" value={answer}
        onChange={e => setAnswer(e.target.value)} onKeyDown={handleKey}
        disabled={feedback !== null} placeholder="Escribe tu respuesta..."
        className="input-field mb-3"
        autoComplete="off" autoCorrect="off" autoCapitalize="off" spellCheck="false" />

      <div className="flex flex-wrap gap-1 mb-3">
        {ACCENTS.map(c => <button key={c} onClick={() => insertChar(c)} className="accent-char">{c}</button>)}
      </div>

      {feedback === null && (
        <div className="flex gap-2">
          <button onClick={submit} className="btn-primary px-6 py-3 flex-1">Comprobar</button>
          <button onClick={() => setShowHint(true)} className="btn-secondary px-4 py-3">Pista</button>
          <button onClick={next} className="btn-secondary px-4 py-3">Saltar</button>
        </div>
      )}

      {showHint && feedback === null && <div className="grammar-note mt-3 text-sm">💡 {hint}</div>}

      {feedback === "right" && (
        <div className="card feedback-correct p-4 mt-2 pop">
          <div className="font-display text-lg mb-1">¡Correcto! ✓</div>
          <div className="text-sm font-serif-italic">{correct}</div>
          <button onClick={next} className="btn-primary px-6 py-2 mt-3 w-full">Siguiente →</button>
        </div>
      )}

      {feedback === "wrong" && (
        <div className="card feedback-wrong p-4 mt-2 shake">
          <div className="font-display text-lg mb-1">Casi ✗</div>
          <div className="text-base mb-1">You wrote: <em>{answer}</em></div>
          <div className="text-base">Correct: <strong>{correct}</strong></div>
          {diffs.length > 0 && <div className="mt-2 text-sm"><strong>Issue:</strong> {diffs.join(", ")}</div>}
          <button onClick={next} className="btn-primary px-6 py-2 mt-3 w-full">Siguiente →</button>
        </div>
      )}
    </div>
  );
}

// ============================================================
// READING
// ============================================================
function Reading({ reading, onDone, onUpdateStats }) {
  const [answers, setAnswers] = useState({});
  const [submitted, setSubmitted] = useState(false);

  const submit = () => {
    setSubmitted(true);
    reading.questions.forEach((q, i) => onUpdateStats(answers[i] === q.correct));
  };

  const score = reading.questions.filter((q, i) => answers[i] === q.correct).length;
  const total = reading.questions.length;

  return (
    <div className="pop">
      <button onClick={onDone} className="btn-secondary px-4 py-2 mb-4 text-sm">← Back</button>
      <div className="card p-4 mb-4">
        <span className="topic-badge mr-2">{TOPICS[reading.topic]?.short}</span>
        <h2 className="font-display text-xl mt-2 mb-3">{reading.title}</h2>
        <div className="reading-text">
          {reading.text.split("\n\n").map((p, i) => <p key={i}>{p}</p>)}
        </div>
      </div>
      <div className="space-y-3">
        {reading.questions.map((q, i) => {
          const userAns = answers[i];
          const isRight = userAns === q.correct;
          return (
            <div key={i} className="card p-3">
              <div className="font-semibold mb-2 text-sm">{i+1}. {q.q}</div>
              <div className="space-y-2">
                {q.choices.map((c, j) => {
                  let cls = "tile p-2 text-sm";
                  if (submitted) {
                    if (j === q.correct) cls += " feedback-correct";
                    else if (j === userAns && j !== q.correct) cls += " feedback-wrong";
                  } else if (userAns === j) cls += " selected";
                  return (
                    <div key={j} onClick={() => !submitted && setAnswers(a => ({...a, [i]: j}))}
                         className={cls} style={submitted ? { cursor: "default" } : {}}>
                      <span className="font-semibold mr-2">{String.fromCharCode(65+j)}.</span>{c}
                    </div>
                  );
                })}
              </div>
              {submitted && (
                <div className="grammar-note mt-2 text-sm">
                  {isRight ? "✓ " : "✗ "}<strong>{isRight ? "Correct" : "Answer: " + String.fromCharCode(65+q.correct)}</strong> — {q.explain}
                </div>
              )}
            </div>
          );
        })}
      </div>
      {!submitted ? (
        <button onClick={submit} disabled={Object.keys(answers).length < total}
                className="btn-primary px-6 py-3 w-full mt-4">
          {Object.keys(answers).length < total
            ? `Answer all (${Object.keys(answers).length}/${total})` : "Check answers"}
        </button>
      ) : (
        <div className="card p-4 mt-4 text-center">
          <div className="font-display text-2xl mb-2">{score}/{total}</div>
          <button onClick={onDone} className="btn-primary px-5 py-2 mt-2">Done</button>
        </div>
      )}
    </div>
  );
}

// ============================================================
// DICTATION
// ============================================================
function Dictation({ set, onDone, onUpdateStats }) {
  const { speak, available } = useSpanishSpeech();
  const [idx, setIdx] = useState(0);
  const [answer, setAnswer] = useState("");
  const [feedback, setFeedback] = useState(null);
  const [score, setScore] = useState(0);
  const [playCount, setPlayCount] = useState(0);
  const [showText, setShowText] = useState(false);
  const inputRef = useRef(null);

  useEffect(() => { if (inputRef.current) inputRef.current.focus(); }, [idx]);

  if (idx >= set.sentences.length) {
    const pct = Math.round(100 * score / set.sentences.length);
    return (
      <div className="card p-6 text-center pop">
        <div className="text-4xl mb-2">🎧</div>
        <h2 className="font-display text-2xl mb-2">¡Hecho!</h2>
        <p className="text-lg mb-2">{score}/{set.sentences.length}</p>
        <div className="progress-bar mb-4 max-w-xs mx-auto"><div className="progress-fill" style={{width:`${pct}%`}}></div></div>
        <div className="flex gap-3 justify-center">
          <button onClick={() => window.location.reload()} className="btn-primary px-5 py-2">Again</button>
          <button onClick={onDone} className="btn-secondary px-5 py-2">Back</button>
        </div>
      </div>
    );
  }

  const current = set.sentences[idx];

  const handlePlay = (rate = 0.85) => {
    speak(current, rate);
    setPlayCount(p => p + 1);
  };

  const submit = () => {
    if (feedback) return;
    if (!answer.trim()) return;
    const right = exactMatch(answer, current);
    setFeedback(right ? "right" : "wrong");
    if (right) setScore(s => s + 1);
    onUpdateStats(right);
  };

  const next = () => {
    setAnswer(""); setFeedback(null); setPlayCount(0); setShowText(false);
    setIdx(i => i + 1);
  };

  const insertChar = (c) => { if (feedback) return; setAnswer(a => a + c); if (inputRef.current) inputRef.current.focus(); };

  const issues = feedback === "wrong" ? findDifferences(answer, current) : [];

  return (
    <div className="pop">
      <div className="flex items-center gap-3 mb-4">
        <button onClick={onDone} className="btn-secondary px-3 py-1 text-sm">← Back</button>
        <div className="progress-bar flex-1"><div className="progress-fill" style={{width:`${(idx/set.sentences.length)*100}%`}}></div></div>
        <span className="text-sm font-semibold">{idx+1}/{set.sentences.length}</span>
      </div>

      <div className="card p-5 mb-4">
        <div className="text-xs uppercase tracking-wide mb-2" style={{color:"var(--terracotta)"}}>
          Dictation · {set.title}
        </div>
        <p className="text-sm mb-3" style={{color:"#666"}}>
          Listen and type exactly what you hear, including accents and punctuation.
        </p>
        {!available && (
          <div className="grammar-note text-sm mb-3" style={{borderColor: "var(--rose)"}}>
            ⚠️ Your browser may not have Spanish voice support. Try Chrome, Safari, or Edge.
          </div>
        )}
        <div className="flex gap-2 flex-wrap items-center">
          <button onClick={() => handlePlay(0.85)} className="play-btn" disabled={!available}>
            ▶ Normal speed
          </button>
          <button onClick={() => handlePlay(0.65)} className="play-btn" disabled={!available}
                  style={{background: "var(--olive)"}}>
            ▶ Slow
          </button>
          <span className="text-xs" style={{color:"#666"}}>Played {playCount} times</span>
        </div>
        {playCount >= 3 && !showText && (
          <button onClick={() => setShowText(true)} className="text-xs underline mt-3" style={{color:"var(--plum)"}}>
            Show text (after 3 plays)
          </button>
        )}
        {showText && (
          <div className="grammar-note mt-3 text-sm font-serif-italic">
            📝 {current}
          </div>
        )}
      </div>

      <input ref={inputRef} type="text" value={answer}
        onChange={e => setAnswer(e.target.value)}
        onKeyDown={e => e.key === "Enter" && (feedback ? next() : submit())}
        disabled={feedback !== null}
        placeholder="Escribe lo que oyes..."
        className="input-field mb-3"
        autoComplete="off" autoCorrect="off" autoCapitalize="off" spellCheck="false" />

      <div className="flex flex-wrap gap-1 mb-3">
        {ACCENTS.map(c => <button key={c} onClick={() => insertChar(c)} className="accent-char">{c}</button>)}
      </div>

      {feedback === null && (
        <button onClick={submit} className="btn-primary px-6 py-3 w-full">Comprobar</button>
      )}

      {feedback === "right" && (
        <div className="card feedback-correct p-4 mt-2 pop">
          <div className="font-display text-lg mb-1">¡Perfecto! ✓</div>
          <button onClick={next} className="btn-primary px-6 py-2 mt-2 w-full">Siguiente →</button>
        </div>
      )}

      {feedback === "wrong" && (
        <div className="card feedback-wrong p-4 mt-2">
          <div className="font-display text-lg mb-2">Casi ✗</div>
          <div className="text-sm mb-1">You wrote:</div>
          <div className="text-base mb-2 font-serif-italic">{answer}</div>
          <div className="text-sm mb-1">Correct:</div>
          <div className="text-base font-serif-italic"><strong>{current}</strong></div>
          {issues.length > 0 && <div className="mt-2 text-sm"><strong>Issue:</strong> {issues.join(", ")}</div>}
          <button onClick={next} className="btn-primary px-6 py-2 mt-3 w-full">Siguiente →</button>
        </div>
      )}
    </div>
  );
}

// ============================================================
// TRANSLATION
// ============================================================
function Translation({ task, onDone, onUpdateStats }) {
  const [answer, setAnswer] = useState("");
  const [submitted, setSubmitted] = useState(false);
  const textareaRef = useRef(null);

  const insertChar = (c) => {
    if (submitted) return;
    setAnswer(a => a + c);
    if (textareaRef.current) textareaRef.current.focus();
  };

  const submit = () => {
    setSubmitted(true);
    // Approximate scoring: count keywords matched
    const lower = answer.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    const matched = task.keywords.filter(kw => lower.includes(kw.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, ""))).length;
    onUpdateStats(matched >= task.keywords.length * 0.7);
  };

  const lower = answer.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
  const matchedKeywords = task.keywords.map(kw => ({
    kw,
    matched: lower.includes(kw.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, ""))
  }));

  return (
    <div className="pop">
      <button onClick={onDone} className="btn-secondary px-4 py-2 mb-4 text-sm">← Back</button>

      <div className="card p-4 mb-4">
        <div className="flex justify-between items-start mb-2">
          <span className="topic-badge">{TOPICS[task.topic]?.short}</span>
          <span className="pill" style={{background:"var(--terracotta)"}}>{task.level} words</span>
        </div>
        <div className="text-xs uppercase tracking-wide mb-2 mt-2" style={{color:"var(--terracotta)"}}>
          Translate to Spanish
        </div>
        <div className="reading-text">{task.english}</div>
      </div>

      <textarea ref={textareaRef} value={answer}
        onChange={e => setAnswer(e.target.value)}
        disabled={submitted}
        placeholder="Escribe tu traducción aquí..."
        rows={5}
        className="input-field mb-2"
        autoComplete="off" autoCorrect="off" spellCheck="false" />

      <div className="flex justify-between items-center mb-3 text-sm">
        <span className="word-counter" style={{color:"#666"}}>Words: {wordCount(answer)}</span>
        {!submitted && <span className="word-counter" style={{color:"#666"}}>Target: ~{task.level}</span>}
      </div>

      <div className="flex flex-wrap gap-1 mb-3">
        {ACCENTS.map(c => <button key={c} onClick={() => insertChar(c)} className="accent-char">{c}</button>)}
      </div>

      {!submitted ? (
        <button onClick={submit} disabled={!answer.trim()} className="btn-primary px-6 py-3 w-full">
          Check translation
        </button>
      ) : (
        <>
          <div className="card p-4 mb-3">
            <div className="font-display text-lg mb-2">Your translation</div>
            <div className="reading-text">{answer}</div>
          </div>

          <div className="card p-4 mb-3">
            <div className="font-display text-lg mb-2">Model translation</div>
            <div className="model-answer">{task.spanish_model}</div>
          </div>

          <div className="card p-4 mb-3">
            <div className="font-display text-lg mb-2">Key structures to look for</div>
            <ul className="text-sm space-y-1">
              {matchedKeywords.map((mk, i) => (
                <li key={i} className="flex items-center gap-2">
                  <span style={{color: mk.matched ? "var(--olive)" : "var(--rose)"}}>
                    {mk.matched ? "✓" : "✗"}
                  </span>
                  <span className="font-serif-italic">{mk.kw}</span>
                </li>
              ))}
            </ul>
          </div>

          <div className="card p-4 mb-3">
            <div className="font-display text-lg mb-2">Grammar notes</div>
            <ul className="text-sm space-y-2">
              {task.notes.map((n, i) => <li key={i} className="grammar-note">💡 {n}</li>)}
            </ul>
          </div>

          <div className="flex gap-2">
            <button onClick={() => { setAnswer(""); setSubmitted(false); }} className="btn-secondary px-5 py-2 flex-1">
              Try again
            </button>
            <button onClick={onDone} className="btn-primary px-5 py-2 flex-1">Done</button>
          </div>
        </>
      )}
    </div>
  );
}

// ============================================================
// WRITING TASK
// ============================================================
function WritingTask({ task, onDone }) {
  const [answer, setAnswer] = useState("");
  const [showModel, setShowModel] = useState(false);
  const [showRubric, setShowRubric] = useState(true);
  const textareaRef = useRef(null);
  const wc = wordCount(answer);
  const target = task.words;
  const inRange = wc >= target * 0.85 && wc <= target * 1.15;

  const insertChar = (c) => {
    setAnswer(a => a + c);
    if (textareaRef.current) textareaRef.current.focus();
  };

  return (
    <div className="pop">
      <button onClick={onDone} className="btn-secondary px-4 py-2 mb-4 text-sm">← Back</button>

      <div className="card p-4 mb-4">
        <div className="flex justify-between items-start mb-2">
          <span className="topic-badge">{TOPICS[task.topic]?.short}</span>
          <span className="pill" style={{background:"var(--terracotta)"}}>{task.words} words · Higher</span>
        </div>
        <h2 className="font-display text-xl mt-2">{task.title}</h2>
        <p className="text-sm mt-2 mb-3">{task.prompt}</p>
        <ul className="text-sm space-y-1 ml-2">
          {task.bullets.map((b, i) => <li key={i}>• {b}</li>)}
        </ul>
      </div>

      {showRubric && (
        <div className="card p-4 mb-4" style={{background: "var(--paper)"}}>
          <div className="flex justify-between items-center mb-2">
            <div className="font-display text-lg">Higher-tier checklist</div>
            <button onClick={() => setShowRubric(false)} className="text-xs underline" style={{color:"#666"}}>hide</button>
          </div>
          <ul className="text-sm space-y-1">
            {task.rubric.map((r, i) => <li key={i}>☐ {r}</li>)}
          </ul>
        </div>
      )}

      <textarea ref={textareaRef} value={answer}
        onChange={e => setAnswer(e.target.value)}
        placeholder="Escribe tu respuesta aquí..."
        rows={10}
        className="input-field mb-2"
        autoComplete="off" autoCorrect="off" spellCheck="false" />

      <div className="flex justify-between items-center mb-3 text-sm">
        <span className="word-counter" style={{color: inRange ? "var(--olive)" : "#666"}}>
          Words: {wc} / target {target} ({Math.round(target*0.85)}-{Math.round(target*1.15)})
        </span>
        {inRange && <span style={{color:"var(--olive)"}}>✓ In range</span>}
      </div>

      <div className="flex flex-wrap gap-1 mb-3">
        {ACCENTS.map(c => <button key={c} onClick={() => insertChar(c)} className="accent-char">{c}</button>)}
      </div>

      <div className="card p-3 mb-3" style={{background: "var(--cream)", borderStyle: "dashed"}}>
        <p className="text-xs font-serif-italic">
          ⚠️ The app can't reliably mark free writing. Compare against the model below, then ask Mum
          or your Spanish teacher to mark your work properly.
        </p>
      </div>

      <button onClick={() => setShowModel(s => !s)} className="btn-secondary px-5 py-2 w-full mb-3">
        {showModel ? "Hide model answer" : "Show model answer"}
      </button>

      {showModel && (
        <div className="card p-4 mb-3">
          <div className="font-display text-lg mb-2">Model answer</div>
          <div className="model-answer whitespace-pre-line">{task.model}</div>
          <p className="text-xs mt-3" style={{color:"#666"}}>
            Word count: {wordCount(task.model)}
          </p>
        </div>
      )}

      <button onClick={onDone} className="btn-primary px-5 py-2 w-full">Done</button>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
